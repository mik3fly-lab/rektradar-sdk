name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - run: npm test

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      # OIDC token for npm Trusted Publishing: no long-lived NPM_TOKEN, and
      # npm auto-attaches provenance. The trusted publisher (this repo +
      # workflow) is configured on npmjs.com's package settings.
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # Trusted Publishing needs npm >= 11.5.1; node 22 still ships npm 10.x.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm publish --access public
